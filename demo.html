<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Searchable Select — Bootstrap 5 / Tailwind Safe</title>

<!-- Demo only: shows it works alongside Bootstrap 5 & Tailwind without clashing.
     Remove these two lines in your real project if you don't need them. -->
<link href="https://cdnjs.cloudflare.com/ajax/libs/bootstrap/5.3.3/css/bootstrap.min.css" rel="stylesheet">
<script src="https://cdn.tailwindcss.com"></script>

<style>
  /*
    ========================================================
    NCS = "Non-Conflicting Select"
    Every class below is prefixed with `ncs-` and every rule
    is scoped under `.ncs-select-wrapper`. Nothing here uses
    a bare `.select`, `.dropdown`, `.form-control`, `.btn`,
    `.flex`, `.hidden`, etc. — the class names that Bootstrap
    and Tailwind already own. That's what keeps it safe to
    drop into a page that loads either (or both) framework.
    All box-sizing / resets are scoped too, so they never leak
    out and affect Bootstrap or Tailwind elements elsewhere.
    ========================================================
  */

  .ncs-select-wrapper, .ncs-select-wrapper * {
    box-sizing: border-box;
  }

  .ncs-select-wrapper {
    --ncs-border: #d7dbe0;
    --ncs-border-focus: #6d5efc;
    --ncs-bg: #ffffff;
    --ncs-text: #1f2430;
    --ncs-muted: #8892a0;
    --ncs-hover: #f3f1ff;
    --ncs-active: #6d5efc;
    --ncs-active-text: #ffffff;
    --ncs-radius: 10px;
    --ncs-shadow: 0 10px 30px rgba(31, 36, 48, 0.12);

    position: relative;
    width: 100%;
    max-width: 360px;
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
    font-size: 14px;
    line-height: 1.4;
    color: var(--ncs-text);
  }

  .ncs-control {
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 8px;
    width: 100%;
    min-height: 42px;
    padding: 8px 12px;
    background: var(--ncs-bg);
    border: 1.5px solid var(--ncs-border);
    border-radius: var(--ncs-radius);
    cursor: pointer;
    user-select: none;
    transition: border-color .15s ease, box-shadow .15s ease;
  }

  .ncs-control:hover {
    border-color: #b9bfca;
  }

  .ncs-select-wrapper.ncs-open .ncs-control {
    border-color: var(--ncs-border-focus);
    box-shadow: 0 0 0 3px rgba(109, 94, 252, 0.15);
  }

  .ncs-control-value {
    flex: 1 1 auto;
    overflow: hidden;
    text-overflow: ellipsis;
    white-space: nowrap;
  }

  .ncs-control-value.ncs-placeholder {
    color: var(--ncs-muted);
  }

  .ncs-caret {
    flex: none;
    width: 18px;
    height: 18px;
    color: var(--ncs-muted);
    transition: transform .15s ease;
  }

  .ncs-select-wrapper.ncs-open .ncs-caret {
    transform: rotate(180deg);
  }

  .ncs-panel {
    position: absolute;
    z-index: 2147483000; /* stay above bootstrap/tailwind layered components */
    top: calc(100% + 6px);
    left: 0;
    right: 0;
    background: var(--ncs-bg);
    border: 1px solid var(--ncs-border);
    border-radius: var(--ncs-radius);
    box-shadow: var(--ncs-shadow);
    overflow: hidden;
    opacity: 0;
    transform: translateY(-6px);
    pointer-events: none;
    transition: opacity .12s ease, transform .12s ease;
  }

  .ncs-select-wrapper.ncs-open .ncs-panel {
    opacity: 1;
    transform: translateY(0);
    pointer-events: auto;
  }

  .ncs-search-box {
    position: relative;
    padding: 8px;
    border-bottom: 1px solid var(--ncs-border);
  }

  .ncs-search-box svg {
    position: absolute;
    left: 20px;
    top: 50%;
    transform: translateY(-50%);
    width: 15px;
    height: 15px;
    color: var(--ncs-muted);
    pointer-events: none;
  }

  .ncs-search-input {
    width: 100%;
    padding: 8px 10px 8px 32px;
    border: 1px solid var(--ncs-border);
    border-radius: 8px;
    outline: none;
    font-size: 14px;
    color: var(--ncs-text);
    background: #fafbfc;
  }

  .ncs-search-input:focus {
    border-color: var(--ncs-border-focus);
    background: #fff;
  }

  .ncs-options {
    max-height: 220px;
    overflow-y: auto;
    padding: 6px;
  }

  .ncs-options::-webkit-scrollbar {
    width: 8px;
  }
  .ncs-options::-webkit-scrollbar-thumb {
    background: #d7dbe0;
    border-radius: 8px;
  }

  .ncs-option {
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 8px;
    padding: 9px 10px;
    border-radius: 8px;
    cursor: pointer;
  }

  .ncs-option:hover,
  .ncs-option.ncs-highlighted {
    background: var(--ncs-hover);
  }

  .ncs-option.ncs-selected {
    background: var(--ncs-active);
    color: var(--ncs-active-text);
  }

  .ncs-option-check {
    width: 16px;
    height: 16px;
    flex: none;
    visibility: hidden;
  }

  .ncs-option.ncs-selected .ncs-option-check {
    visibility: visible;
  }

  .ncs-empty {
    padding: 16px 10px;
    text-align: center;
    color: var(--ncs-muted);
  }

  .ncs-select-wrapper.ncs-disabled .ncs-control {
    background: #f3f4f6;
    color: var(--ncs-muted);
    cursor: not-allowed;
  }
</style>
</head>
<body class="bg-light">

<div class="container py-5" style="max-width:720px;">

  <h1 class="h4 mb-2">Searchable &amp; Styled Select</h1>
  <p class="text-muted mb-4">
    Plain HTML/CSS/JS component, namespaced under <code>ncs-*</code> classes so it
    won't clash with Bootstrap 5 or Tailwind utility classes loaded on the same page.
  </p>

  <div class="row g-4">
    <div class="col-12 col-md-6">
      <label class="form-label fw-semibold">Country (custom searchable select)</label>
      <div id="country-select"></div>
    </div>

    <div class="col-12 col-md-6">
      <label class="form-label fw-semibold d-block">Native Bootstrap select (for comparison)</label>
      <select class="form-select">
        <option>India</option>
        <option>United States</option>
        <option>Germany</option>
      </select>
    </div>
  </div>

  <div class="mt-4 p-3 rounded" style="background:#fff;border:1px solid #e5e7eb;">
    <span class="tw-text-sm" style="font-family:inherit;">
      Selected value: <strong id="selected-output">none</strong>
    </span>
  </div>

</div>

<script>
(function () {
  "use strict";

  /* ---------- Reusable factory: window.NCS.createSelect ---------- */
  window.NCS = window.NCS || {};

  NCS.createSelect = function (mountEl, options) {
    var items = options.items || [];               // [{value, label}]
    var placeholder = options.placeholder || "Select an option";
    var onChange = options.onChange || function () {};
    var selected = null;
    var highlightedIndex = -1;
    var filtered = items.slice();

    var wrapper = document.createElement("div");
    wrapper.className = "ncs-select-wrapper";

    wrapper.innerHTML =
      '<div class="ncs-control" tabindex="0" role="button" aria-haspopup="listbox">' +
        '<span class="ncs-control-value ncs-placeholder">' + placeholder + '</span>' +
        '<svg class="ncs-caret" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">' +
          '<path d="M6 9l6 6 6-6"/>' +
        '</svg>' +
      '</div>' +
      '<div class="ncs-panel">' +
        '<div class="ncs-search-box">' +
          '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">' +
            '<circle cx="11" cy="11" r="7"/><path d="M21 21l-4.3-4.3"/>' +
          '</svg>' +
          '<input type="text" class="ncs-search-input" placeholder="Search..." autocomplete="off">' +
        '</div>' +
        '<div class="ncs-options" role="listbox"></div>' +
      '</div>';

    mountEl.appendChild(wrapper);

    var controlEl = wrapper.querySelector(".ncs-control");
    var valueEl = wrapper.querySelector(".ncs-control-value");
    var searchInput = wrapper.querySelector(".ncs-search-input");
    var optionsEl = wrapper.querySelector(".ncs-options");

    function renderOptions() {
      optionsEl.innerHTML = "";
      if (filtered.length === 0) {
        var empty = document.createElement("div");
        empty.className = "ncs-empty";
        empty.textContent = "No results found";
        optionsEl.appendChild(empty);
        return;
      }
      filtered.forEach(function (item, idx) {
        var opt = document.createElement("div");
        opt.className = "ncs-option" +
          (selected && selected.value === item.value ? " ncs-selected" : "") +
          (idx === highlightedIndex ? " ncs-highlighted" : "");
        opt.setAttribute("role", "option");
        opt.dataset.index = idx;
        opt.innerHTML =
          '<span>' + item.label + '</span>' +
          '<svg class="ncs-option-check" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">' +
            '<path d="M20 6L9 17l-5-5"/>' +
          '</svg>';
        opt.addEventListener("click", function () {
          selectItem(item);
        });
        optionsEl.appendChild(opt);
      });
    }

    function selectItem(item) {
      selected = item;
      valueEl.textContent = item.label;
      valueEl.classList.remove("ncs-placeholder");
      close();
      renderOptions();
      onChange(item);
    }

    function open() {
      wrapper.classList.add("ncs-open");
      searchInput.value = "";
      filtered = items.slice();
      highlightedIndex = selected ? filtered.findIndex(function (i) { return i.value === selected.value; }) : -1;
      renderOptions();
      setTimeout(function () { searchInput.focus(); }, 0);
    }

    function close() {
      wrapper.classList.remove("ncs-open");
    }

    function toggle() {
      if (wrapper.classList.contains("ncs-open")) close(); else open();
    }

    controlEl.addEventListener("click", toggle);
    controlEl.addEventListener("keydown", function (e) {
      if (e.key === "Enter" || e.key === " ") {
        e.preventDefault();
        toggle();
      }
    });

    searchInput.addEventListener("input", function () {
      var q = searchInput.value.trim().toLowerCase();
      filtered = items.filter(function (i) {
        return i.label.toLowerCase().indexOf(q) !== -1;
      });
      highlightedIndex = filtered.length ? 0 : -1;
      renderOptions();
    });

    searchInput.addEventListener("keydown", function (e) {
      if (e.key === "ArrowDown") {
        e.preventDefault();
        highlightedIndex = Math.min(highlightedIndex + 1, filtered.length - 1);
        renderOptions();
        scrollHighlightedIntoView();
      } else if (e.key === "ArrowUp") {
        e.preventDefault();
        highlightedIndex = Math.max(highlightedIndex - 1, 0);
        renderOptions();
        scrollHighlightedIntoView();
      } else if (e.key === "Enter") {
        e.preventDefault();
        if (filtered[highlightedIndex]) selectItem(filtered[highlightedIndex]);
      } else if (e.key === "Escape") {
        close();
        controlEl.focus();
      }
    });

    function scrollHighlightedIntoView() {
      var el = optionsEl.querySelector(".ncs-highlighted");
      if (el) el.scrollIntoView({ block: "nearest" });
    }

    document.addEventListener("click", function (e) {
      if (!wrapper.contains(e.target)) close();
    });

    renderOptions();

    return {
      getValue: function () { return selected; },
      setValue: function (value) {
        var found = items.find(function (i) { return i.value === value; });
        if (found) selectItem(found);
      },
      disable: function () { wrapper.classList.add("ncs-disabled"); },
      enable: function () { wrapper.classList.remove("ncs-disabled"); }
    };
  };

  /* ---------- Demo wiring ---------- */
  var countries = [
    { value: "in", label: "India" },
    { value: "us", label: "United States" },
    { value: "de", label: "Germany" },
    { value: "fr", label: "France" },
    { value: "jp", label: "Japan" },
    { value: "br", label: "Brazil" },
    { value: "ca", label: "Canada" },
    { value: "au", label: "Australia" },
    { value: "gb", label: "United Kingdom" },
    { value: "za", label: "South Africa" },
    { value: "ng", label: "Nigeria" },
    { value: "mx", label: "Mexico" },
    { value: "kr", label: "South Korea" },
    { value: "it", label: "Italy" },
    { value: "es", label: "Spain" }
  ];

  NCS.createSelect(document.getElementById("country-select"), {
    items: countries,
    placeholder: "Select a country",
    onChange: function (item) {
      document.getElementById("selected-output").textContent = item.label + " (" + item.value + ")";
    }
  });
})();
</script>

</body>
</html>
